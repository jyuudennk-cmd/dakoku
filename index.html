<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB打刻システム</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 400px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 10px; margin-bottom: 20px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; }
        button { width: 48%; padding: 15px; font-size: 18px; font-weight: bold; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .btn-in { background-color: #4CAF50; }
        .btn-out { background-color: #f44336; float: right; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>WEB打刻</h2>
    
    <label for="areaSelect">エリアを選択：</label>
    <select id="areaSelect" onchange="updateNames()">
        <option value="">データを読み込み中...</option>
    </select>

    <label for="staffName">名前を選択：</label>
    <select id="staffName">
        <option value="">先にエリアを選択してください</option>
    </select>

    <div>
        <button class="btn-in" onclick="recordTime('in')">出勤</button>
        <button class="btn-out" onclick="recordTime('out')">退勤</button>
    </div>

    <p id="status"></p>
</div>

<script>
    // ★ご指定のGASのURLを組み込み済みです
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx5y8vvYZratAOYXlmATKQvO9A9fJAG9m_UrbY5xkMTsw4m53mnACyZb8HKh9v7Wajv/exec'; 
    let rosterData = {}; 

    // 画面読み込み時にスプレッドシートから名簿（エリアと名前）を取得
    document.addEventListener('DOMContentLoaded', () => {
        fetch(`${GAS_URL}?action=getNames`)
            .then(response => response.json())
            .then(data => {
                rosterData = data; 
                const areaSelect = document.getElementById('areaSelect');
                areaSelect.innerHTML = '<option value="">エリアを選択してください</option>';
                
                // エリアのプルダウンを作成
                Object.keys(rosterData).forEach(area => {
                    const option = document.createElement('option');
                    option.value = area;
                    option.textContent = area;
                    areaSelect.appendChild(option);
                });
            })
            .catch(error => {
                console.error("名簿取得エラー:", error);
                document.getElementById('areaSelect').innerHTML = '<option value="">読み込み失敗</option>';
            });
    });

    // エリアが選択されたら、名前のプルダウンを連動して切り替える
    function updateNames() {
        const selectedArea = document.getElementById('areaSelect').value;
        const nameSelect = document.getElementById('staffName');
        
        nameSelect.innerHTML = '<option value="">名前を選択してください</option>';
        
        if (selectedArea && rosterData[selectedArea]) {
            rosterData[selectedArea].forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                nameSelect.appendChild(option);
            });
        }
    }

    // 打刻処理（位置情報取得とデータ送信）
    function recordTime(type) {
        const name = document.getElementById('staffName').value;
        const statusEl = document.getElementById('status');

        if (!name) {
            statusEl.textContent = "※エリアと名前を選択してください";
            statusEl.style.color = "red";
            return;
        }

        statusEl.textContent = "位置情報を取得中...";
        statusEl.style.color = "blue";

        if (!navigator.geolocation) {
            statusEl.textContent = "端末が位置情報に対応していません。";
            statusEl.style.color = "red";
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                sendData(name, type, lat, lng);
            },
            (error) => {
                statusEl.textContent = "位置情報の取得に失敗しました。";
                statusEl.style.color = "red";
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function sendData(name, type, lat, lng) {
        const statusEl = document.getElementById('status');
        statusEl.textContent = "データ送信中...";

        const url = `${GAS_URL}?action=record&name=${encodeURIComponent(name)}&type=${type}&lat=${lat}&lng=${lng}`;

        fetch(url)
            .then(response => response.json())
            .then(result => {
                const typeText = type === 'in' ? '出勤' : '退勤';
                statusEl.textContent = `${name}さんの${typeText}を記録しました！`;
                statusEl.style.color = "green";
                
                // 送信完了後、画面を初期状態に戻す
                setTimeout(() => {
                    statusEl.textContent = "";
                    document.getElementById('areaSelect').value = "";
                    document.getElementById('staffName').innerHTML = '<option value="">先にエリアを選択してください</option>';
                }, 3000);
            })
            .catch((error) => {
                statusEl.textContent = "通信エラーが発生しました。";
                statusEl.style.color = "red";
            });
    }
</script>

</body>
</html>
